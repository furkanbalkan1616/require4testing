<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::content})">

<div th:fragment="content">

    <h2 class="mb-4">📊 Dashboard</h2>

    <div class="row g-3 mb-4">

        <div class="col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted">Total Executions</h6>
                    <h2 th:text="${totalExecutions ?: 0}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow-sm border-success">
                <div class="card-body">
                    <h6 class="text-success">Passed</h6>
                    <h2 class="text-success" th:text="${passed ?: 0}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow-sm border-danger">
                <div class="card-body">
                    <h6 class="text-danger">Failed</h6>
                    <h2 class="text-danger" th:text="${failed ?: 0}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow-sm border-primary">
                <div class="card-body">
                    <h6 class="text-primary">Success Rate</h6>
                    <h2 class="text-primary" th:text="${successRate ?: 0} + '%'"></h2>
                </div>
            </div>
        </div>

    </div>

    <div class="card shadow">
        <div class="card-body">

            <h5 class="mb-3">🧪 Letzte Executions</h5>

            <table class="table table-hover">

                <thead>
                <tr>
                    <th>TestCase</th>
                    <th>TestRun</th>
                    <th>Tester</th>
                    <th>Result</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="e : ${executions}">
                    <td th:text="${e.testCaseTitle}"></td>
                    <td th:text="${e.testRunName}"></td>
                    <td th:text="${e.testerName}"></td>
                    <td th:text="${e.result}"></td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</html>
