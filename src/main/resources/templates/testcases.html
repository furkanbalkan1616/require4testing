<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">

<head>
    <title>TestCases</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body.dark {
            background-color: #121212;
            color: white;
        }

        body.dark .card {
            background-color: #1e1e1e;
        }

        body.dark .table {
            color: white;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(8px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .table-hover tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            transition: 0.2s;
        }
    </style>
</head>

<body class="bg-light fade-in" id="body">

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 shadow">
    <a class="navbar-brand fw-bold" href="/dashboard">🚀 Require4Testing</a>

    <div class="navbar-nav flex-row">

        <!-- 🔥 NEU -->
        <a class="nav-link text-white me-3" href="/dashboard">Dashboard</a>

        <a class="nav-link text-white me-3" href="/requirements">Requirements</a>

        <!-- 🔥 AKTIV -->
        <a class="nav-link text-warning fw-bold me-3" href="/testcases">TestCases</a>

        <a class="nav-link text-white me-3" href="/testruns">TestRuns</a>
        <a class="nav-link text-white" href="/executions">Executions</a>
    </div>

    <div class="ms-auto">
        <button onclick="toggleDark()" class="btn btn-outline-light btn-sm">🌙</button>
    </div>
</nav>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>🧪 TestCases</h2>

        <input type="text" id="search" class="form-control w-25"
               placeholder="🔍 Suche..."
               onkeyup="filterTable()">
    </div>

    <!-- ALERTS -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- FORM -->
    <div class="card shadow mb-4">
        <div class="card-body">

            <form th:action="@{/testcases}" th:object="${testcase}" method="post">

                <div class="row g-2">

                    <div class="col-md-3">
                        <input th:field="*{title}" class="form-control" placeholder="Titel">
                        <div class="text-danger small" th:errors="*{title}"></div>
                    </div>

                    <div class="col-md-3">
                        <input th:field="*{description}" class="form-control" placeholder="Beschreibung">
                        <div class="text-danger small" th:errors="*{description}"></div>
                    </div>

                    <div class="col-md-3">
                        <input th:field="*{expectedResult}" class="form-control" placeholder="Expected Result">
                        <div class="text-danger small" th:errors="*{expectedResult}"></div>
                    </div>

                    <div class="col-md-2">
                        <select th:field="*{requirementId}" class="form-select">
                            <option value="">Requirement wählen</option>
                            <option th:each="r : ${requirements}"
                                    th:value="${r.id}"
                                    th:text="${r.title}">
                            </option>
                        </select>
                        <div class="text-danger small" th:errors="*{requirementId}"></div>
                    </div>

                    <div class="col-md-1 d-grid">
                        <button class="btn btn-success">💾</button>
                    </div>

                </div>

            </form>

        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover align-middle" id="table">

                <thead class="table-light">
                <tr>
                    <th>Titel</th>
                    <th>Beschreibung</th>
                    <th>Expected</th>
                    <th>Requirement</th>
                    <th class="text-end">Aktion</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(testcases)}">
                    <td colspan="5" class="text-center text-muted">
                        Keine TestCases vorhanden
                    </td>
                </tr>

                <tr th:each="t : ${testcases}">

                    <td th:text="${t.title}"></td>
                    <td th:text="${t.description}"></td>

                    <td>
                        <span class="badge bg-success" th:text="${t.expectedResult}"></span>
                    </td>

                    <td>
                        <span class="badge bg-primary"
                              th:text="${t.requirementTitle != null ? t.requirementTitle : 'Kein Requirement'}">
                        </span>
                    </td>

                    <td class="text-end">
                        <button class="btn btn-danger btn-sm"
                                th:onclick="|confirmDelete(${t.id})|">
                            🗑
                        </button>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Löschen?</h5>
            </div>

            <div class="modal-body">
                Willst du diesen TestCase wirklich löschen?
            </div>

            <div class="modal-footer">

                <form id="deleteForm" method="post">
                    <button class="btn btn-danger">Ja, löschen</button>
                </form>

                <button class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    function filterTable() {
        let input = document.getElementById("search").value.toLowerCase();
        let rows = document.querySelectorAll("#table tbody tr");

        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(input) ? "" : "none";
        });
    }

    function confirmDelete(id) {
        let form = document.getElementById("deleteForm");
        form.action = "/testcases/delete/" + id;

        let modal = new bootstrap.Modal(document.getElementById("deleteModal"));
        modal.show();
    }

    function toggleDark() {
        document.getElementById("body").classList.toggle("dark");
    }

</script>

</body>
</html>
