<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
    <title>Require4Testing</title>
</h:head>

<h:body>

    <h2>Requirement erstellen</h2>

    <h:form>

        <h:outputLabel value="Titel:"/>
        <h:inputText value="#{requirementController.requirement.title}"/>

        <br/><br/>

        <h:outputLabel value="Beschreibung:"/>
        <h:inputTextarea value="#{requirementController.requirement.description}"/>

        <br/><br/>

        <h:outputLabel value="Priorität:"/>
        <h:inputText value="#{requirementController.requirement.priority}"/>

        <br/><br/>

        <h:commandButton value="Speichern"
                         action="#{requirementController.save}"/>

    </h:form>

</h:body>
</html>
